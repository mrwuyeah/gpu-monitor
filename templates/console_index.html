<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>本地控制台</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #eef6ff 0%, #dbeafe 35%, #e0f2fe 100%);
      min-height: 100vh;
      padding: 24px;
      color: #0f172a;
    }
    .wrap { max-width: 1100px; margin: 0 auto; }
    .top {
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      margin-bottom: 18px;
    }
    .title {
      font-size: 22px; font-weight: 800; letter-spacing: .2px;
      color:#0b2a5b;
    }
    .card {
      background:#ffffff;
      border: 1px solid #e6efff;
      border-radius: 14px;
      box-shadow: 0 10px 28px rgba(15, 102, 240, 0.08);
      padding: 18px;
      margin-bottom: 16px;
    }
    .row { display:flex; gap:12px; flex-wrap:wrap; }
    .field { flex:1; min-width: 220px; }
    label { display:block; font-size:12px; color:#49618a; margin-bottom:6px; font-weight:700; }
    input, textarea {
      width:100%; padding:10px 12px; border-radius:10px;
      border:1px solid #d9e6ff; outline:none;
      background:#fbfdff;
    }
    input:focus, textarea:focus { border-color:#60a5fa; box-shadow:0 0 0 3px rgba(96,165,250,.18); }
    textarea { min-height: 40px; resize: vertical; }
    .btn {
      border: 1px solid #cfe2ff;
      background: linear-gradient(180deg, #ffffff 0%, #f3f8ff 100%);
      color:#0b2a5b;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 800;
      cursor: pointer;
    }
    .btn.primary {
      border-color:#2b7bff;
      background: linear-gradient(180deg, #2b7bff 0%, #0f66f0 100%);
      color:#fff;
      box-shadow: 0 10px 20px rgba(15,102,240,.22);
    }
    .btn.danger { border-color:#fecaca; background:#fff1f2; color:#9f1239; }
    .btn:disabled { opacity:.6; cursor:not-allowed; }

    table { width:100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 10px 10px; border-bottom:1px solid #eef2ff; vertical-align: top; }
    th { text-align:left; color:#1f3b77; background:#f3f8ff; position: sticky; top: 0; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace; }
    .muted { color:#64748b; }
    .actions { display:flex; gap:8px; flex-wrap:wrap; }
    .pill {
      display:inline-block; padding:2px 8px; border-radius:999px;
      border:1px solid #d9e6ff; background:#fbfdff;
      color:#1f3b77; font-weight:700; font-size:12px;
    }
    .logout { display:flex; gap:10px; align-items:center; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div class="title">本地控制台</div>
        <div class="muted" style="margin-top:6px;">管理多个监控实例（网址 + 端口），一键打开实时与历史页面。</div>
      </div>
      <div class="logout">
        <span class="pill">已登录：{{ username }}</span>
        <form method="post" action="/console/logout">
          <button class="btn" type="submit">退出</button>
        </form>
      </div>
    </div>

    <div class="card">
      <div style="font-weight:900;color:#0b2a5b;margin-bottom:12px;">新增/更新实例</div>
      <div class="row">
        <div class="field">
          <label>名称</label>
          <input id="name" placeholder="例如：GPU服务器A" />
        </div>
        <div class="field">
          <label>Base URL</label>
          <input id="base_url" class="mono" placeholder="http://10.99.40.67:5000" />
        </div>
        <div class="field">
          <label>Metrics URL（可选）</label>
          <input id="metrics_url" class="mono" placeholder="http://10.99.40.67:8000/metrics" />
        </div>
      </div>
      <div class="row" style="margin-top:12px;">
        <div class="field" style="min-width: 420px; flex: 2;">
          <label>备注（可选）</label>
          <textarea id="notes" placeholder="例如：35B 主服务 / 0.5B 备份等"></textarea>
        </div>
        <div style="display:flex; align-items:flex-end; gap:10px;">
          <button class="btn primary" id="saveBtn">保存</button>
          <button class="btn" id="resetBtn">清空</button>
        </div>
      </div>
      <input type="hidden" id="edit_id" />
      <div id="msg" class="muted" style="margin-top:10px;"></div>
    </div>

    <div class="card" style="padding:0; overflow:auto;">
      <div style="padding:16px 18px; font-weight:900; color:#0b2a5b;">实例列表</div>
      <table>
        <thead>
          <tr>
            <th style="min-width:160px;">名称</th>
            <th style="min-width:320px;">Base URL</th>
            <th style="min-width:320px;">Metrics</th>
            <th style="min-width:240px;">操作</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const tbody = document.getElementById('tbody');
    const msg = document.getElementById('msg');

    function setMsg(t) { msg.textContent = t || ''; }

    function val(id) { return document.getElementById(id).value.trim(); }
    function setVal(id, v) { document.getElementById(id).value = v || ''; }

    async function api(path, opts) {
      const r = await fetch(path, Object.assign({ headers: { 'Content-Type': 'application/json' } }, opts || {}));
      const txt = await r.text();
      let data = null;
      try { data = txt ? JSON.parse(txt) : null; } catch { data = { raw: txt }; }
      if (!r.ok) throw new Error((data && data.error) ? data.error : ('HTTP ' + r.status));
      return data;
    }

    function render(items) {
      tbody.innerHTML = '';
      if (!items || !items.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="muted" style="padding:14px 18px;">暂无实例，请先添加。</td></tr>';
        return;
      }
      for (const it of items) {
        const base = it.base_url || '';
        const metrics = it.metrics_url || '';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><div style="font-weight:800;">${escapeHtml(it.name || '')}</div><div class="muted">#${it.id}</div></td>
          <td class="mono">${escapeHtml(base)}</td>
          <td class="mono muted">${escapeHtml(metrics || '-') }</td>
          <td>
            <div class="actions">
              <a class="btn" href="${base}/" target="_blank" rel="noopener">实时</a>
              <a class="btn" href="${base}/history" target="_blank" rel="noopener">历史</a>
              <button class="btn" data-edit="${it.id}">编辑</button>
              <button class="btn danger" data-del="${it.id}">删除</button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      }
    }

    function escapeHtml(s) {
      return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
    }

    async function load() {
      const data = await api('/console/api/instances');
      render(data.items || []);
    }

    document.getElementById('saveBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      setMsg('');
      const id = val('edit_id');
      const payload = {
        name: val('name'),
        base_url: val('base_url'),
        metrics_url: val('metrics_url'),
        notes: val('notes'),
      };
      if (!payload.name || !payload.base_url) {
        setMsg('名称与 Base URL 为必填。');
        return;
      }
      try {
        if (id) {
          await api('/console/api/instances/' + encodeURIComponent(id), { method: 'PUT', body: JSON.stringify(payload) });
          setMsg('已更新。');
        } else {
          await api('/console/api/instances', { method: 'POST', body: JSON.stringify(payload) });
          setMsg('已保存。');
        }
        setVal('edit_id','');
        setVal('name','');
        setVal('base_url','');
        setVal('metrics_url','');
        setVal('notes','');
        await load();
      } catch (err) {
        setMsg('失败：' + err.message);
      }
    });

    document.getElementById('resetBtn').addEventListener('click', (e) => {
      e.preventDefault();
      setVal('edit_id','');
      setVal('name','');
      setVal('base_url','');
      setVal('metrics_url','');
      setVal('notes','');
      setMsg('');
    });

    tbody.addEventListener('click', async (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;
      const editId = btn.getAttribute('data-edit');
      const delId = btn.getAttribute('data-del');

      if (editId) {
        try {
          const data = await api('/console/api/instances');
          const it = (data.items || []).find(x => String(x.id) === String(editId));
          if (!it) return;
          setVal('edit_id', it.id);
          setVal('name', it.name);
          setVal('base_url', it.base_url);
          setVal('metrics_url', it.metrics_url);
          setVal('notes', it.notes);
          setMsg('编辑中：#' + it.id);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } catch (err) {
          setMsg('读取失败：' + err.message);
        }
      }

      if (delId) {
        if (!confirm('确认删除实例 #' + delId + ' ?')) return;
        try {
          await api('/console/api/instances/' + encodeURIComponent(delId), { method: 'DELETE' });
          setMsg('已删除。');
          await load();
        } catch (err) {
          setMsg('删除失败：' + err.message);
        }
      }
    });

    load().catch(err => setMsg('加载失败：' + err.message));
  </script>
</body>
</html>
