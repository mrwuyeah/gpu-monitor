<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>本地控制台</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #eef6ff 0%, #dbeafe 35%, #e0f2fe 100%);
      min-height: 100vh;
      padding: 24px;
      color: #0f172a;
    }
    .wrap { max-width: 1100px; margin: 0 auto; }
    .top {
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      margin-bottom: 18px;
    }
    .title {
      font-size: 22px; font-weight: 800; letter-spacing: .2px;
      color:#0b2a5b;
    }
    .card {
      background:#ffffff;
      border: 1px solid #e6efff;
      border-radius: 14px;
      box-shadow: 0 10px 28px rgba(15, 102, 240, 0.08);
      padding: 18px;
      margin-bottom: 16px;
    }
    .row { display:flex; gap:12px; flex-wrap:wrap; }
    .field { flex:1; min-width: 220px; }
    label { display:block; font-size:12px; color:#49618a; margin-bottom:6px; font-weight:700; }
    input, textarea {
      width:100%; padding:10px 12px; border-radius:10px;
      border:1px solid #d9e6ff; outline:none;
      background:#fbfdff;
    }
    input:focus, textarea:focus { border-color:#60a5fa; box-shadow:0 0 0 3px rgba(96,165,250,.18); }
    textarea { min-height: 40px; resize: vertical; }
    .btn {
      border: 1px solid #cfe2ff;
      background: linear-gradient(180deg, #ffffff 0%, #f3f8ff 100%);
      color:#0b2a5b;
      padding: 8px 12px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      text-decoration: none;
      display: inline-block;
    }
    .btn.primary {
      border-color:#2b7bff;
      background: linear-gradient(180deg, #2b7bff 0%, #0f66f0 100%);
      color:#fff;
      box-shadow: 0 10px 20px rgba(15,102,240,.22);
    }
    .btn.danger { border-color:#fecaca; background:#fff1f2; color:#9f1239; }
    .btn:disabled { opacity:.6; cursor:not-allowed; }

    table { width:100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 10px 12px; border-bottom:1px solid #eef2ff; vertical-align: middle; }
    th { text-align:left; color:#1f3b77; background:#f3f8ff; position: sticky; top: 0; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace; }
    .muted { color:#64748b; }
    .logout { display:flex; gap:10px; align-items:center; }

    .perm-tag {
      display:inline-block; padding:2px 6px; border-radius:4px;
      font-size:11px; font-weight:700; margin:1px 2px;
      white-space: nowrap; word-break: keep-all; line-height: 1.4;
    }
    .tag-admin { background:#e0f2fe; color:#0369a1; }
    .tag-senior { background:#fff7ed; color:#9a3412; }
    .tag-junior { background:#f8fafc; color:#475569; }

    .op-cell { display:flex; flex-direction:column; gap:6px; min-width: 260px; }
    .op-perms { display:flex; gap:2px; flex-wrap:wrap; }
    .op-btns { display:flex; gap:6px; flex-wrap:nowrap; align-items:center; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div class="title">本地控制台</div>
        <div class="muted" style="margin-top:6px;">管理多个监控实例（网址 + 端口），一键打开实时与历史页面。</div>
      </div>
      <div class="logout">
        <span class="pill">已登录：{{ username }}</span>
        {% if role == 'admin' %}
        <a class="btn" href="/console/users">用户管理</a>
        <a class="btn" href="/console/settings">API设置</a>
        {% endif %}
        <a class="btn" href="/console/settings#password">修改密码</a>
        <form method="post" action="/console/logout" style="display:inline;">
          <button class="btn" type="submit">退出</button>
        </form>
      </div>
    </div>

    <div class="card">
      <div style="font-weight:900;color:#0b2a5b;margin-bottom:12px;">新增/更新实例</div>
      <div class="row">
        <div class="field">
          <label>名称</label>
          <input id="name" placeholder="例如：GPU服务器A" />
        </div>
        <div class="field">
          <label>Base URL</label>
          <input id="base_url" class="mono" placeholder="http://10.99.40.67:5000" />
        </div>
      </div>
      <div class="row" style="margin-top:12px;">
        <div class="field" style="min-width: 280px;">
          <label>API 令牌</label>
          <div style="display:flex;gap:8px;">
            <input id="api_token" class="mono" type="password" placeholder="输入 API 令牌" style="flex:1;" />
            <button class="btn" id="verifyBtn" style="white-space:nowrap;">验证</button>
          </div>
        </div>
        <div class="field" style="min-width: 300px; flex: 2;">
          <label>备注（可选）</label>
          <textarea id="notes" placeholder="例如：35B 主服务 / 0.5B 备份等"></textarea>
        </div>
        <div style="display:flex; align-items:flex-end; gap:10px;">
          <button class="btn primary" id="saveBtn" style="padding:10px 18px;">保存</button>
          <button class="btn" id="resetBtn">清空</button>
        </div>
      </div>
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid #e6efff;">
        <label style="font-size:12px;color:#49618a;font-weight:700;margin-bottom:6px;">权限设置（允许哪些角色访问此实例）</label>
        <div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:4px;">
          <label style="display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer;">
            <input type="checkbox" class="perm-cb" value="admin" checked /> <span style="color:#0369a1;font-weight:700;">管理员</span>
          </label>
          <label style="display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer;">
            <input type="checkbox" class="perm-cb" value="senior" checked /> <span style="color:#9a3412;font-weight:700;">高级</span>
          </label>
          <label style="display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer;">
            <input type="checkbox" class="perm-cb" value="junior" checked /> <span style="color:#475569;font-weight:700;">初级</span>
          </label>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-top:10px;">
        <input type="hidden" id="edit_id" />
        <div id="msg" class="muted" style="flex:1;"></div>
        <div id="verifyResult" style="font-size:13px;font-weight:700;"></div>
      </div>
    </div>


    <div class="card" style="padding:0; overflow:auto;">
      <div style="padding:16px 18px; font-weight:900; color:#0b2a5b;">实例列表</div>
      <table>
        <thead>
          <tr>
            <th style="min-width:140px;">名称</th>
            <th style="min-width:340px;">Base URL</th>
            <th style="min-width:340px;">操作</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script>
    var tbody = document.getElementById('tbody');
    var msg = document.getElementById('msg');

    function setMsg(t) { if (msg) msg.textContent = t || ''; }

    function val(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; }
    function setVal(id, v) { var el = document.getElementById(id); if (el) el.value = v || ''; }

    function api(method, path, body) {
      var opts = {
        method: method,
        credentials: 'same-origin',
      };
      if (body !== undefined && body !== null) {
        opts.headers = { 'Content-Type': 'application/json' };
        opts.body = JSON.stringify(body);
      }
      return fetch(path, opts).then(function(r) {
        return r.text().then(function(txt) {
          var data = null;
          try { data = txt ? JSON.parse(txt) : null; } catch (e) { data = null; }
          if (r.ok) return data;
          var errMsg = (data && (data.error || data.message)) || ('HTTP ' + r.status);
          throw new Error(errMsg);
        });
      }).catch(function(err) {
        if (err.message.indexOf('HTTP') === 0 || err.message.indexOf('Failed to fetch') >= 0) {
          throw err;
        }
        throw err;
      });
    }

    function render(items) {
      tbody.innerHTML = '';
      if (!items || !items.length) {
        tbody.innerHTML = '<tr><td colspan="3" class="muted" style="padding:14px 18px;">暂无实例，请先添加。</td></tr>';
        return;
      }
      for (var i = 0; i < items.length; i++) {
        var it = items[i];
        var base = it.base_url || '';
        var instanceToken = it.token || '';
        var sep = base.indexOf('?') >= 0 ? '&' : '?';
        var tokenSuffix = instanceToken ? (sep + 'token=' + encodeURIComponent(instanceToken)) : '';

        var roles = (it.allowed_roles || "admin,senior,junior").split(",");
        var labels = {admin:"管理",senior:"高级",junior:"初级"};
        var cssMap = {admin:"tag-admin",senior:"tag-senior",junior:"tag-junior"};
        var roleHtml = '';
        for (var j = 0; j < roles.length; j++) {
          var r = roles[j].trim();
          if (!r) continue;
          var l = labels[r] || r;
          var cls = cssMap[r] || '';
          roleHtml += '<span class="perm-tag ' + cls + '">' + l + '</span>';
        }

        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td><div style="font-weight:800;">' + escHtml(it.name || '') + '</div><div class="muted" style="font-size:11px;">#' + it.id + '</div></td>' +
          '<td class="mono">' + escHtml(base) + '</td>' +
          '<td>' +
            '<div class="op-cell">' +
              '<div class="op-perms">' + roleHtml + '</div>' +
              '<div class="op-btns">' +
                '<a class="btn" href="' + escHtml(base) + '/' + tokenSuffix + '" target="_blank" rel="noopener">实时</a>' +
                '<a class="btn" href="' + escHtml(base) + '/history' + tokenSuffix + '" target="_blank" rel="noopener">历史</a>' +
                '<button class="btn" data-edit="' + it.id + '">编辑</button>' +
                '<button class="btn danger" data-del="' + it.id + '">删除</button>' +
              '</div>' +
            '</div>' +
          '</td>';
        tbody.appendChild(tr);
      }
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function getSelectedRoles() {
      var cbs = document.querySelectorAll('.perm-cb');
      var selected = [];
      for (var i = 0; i < cbs.length; i++) { if (cbs[i].checked) selected.push(cbs[i].value); }
      return selected.length ? selected.join(',') : 'admin';
    }

    function setSelectedRoles(str) {
      var vals = (str || 'admin,senior,junior').split(',');
      var cbs = document.querySelectorAll('.perm-cb');
      for (var i = 0; i < cbs.length; i++) {
        cbs[i].checked = false;
        for (var j = 0; j < vals.length; j++) {
          if (cbs[i].value === vals[j].trim()) { cbs[i].checked = true; break; }
        }
      }
    }

    function load() {
      return api('GET', '/console/api/instances').then(function(data) {
        render(data ? (data.items || []) : []);
      });
    }

    // ── 保存按钮 ──
    document.getElementById('saveBtn').addEventListener('click', function(e) {
      e.preventDefault();
      setMsg('');
      var id = val('edit_id');
      var payload = {
        name: val('name'),
        base_url: val('base_url'),
        metrics_url: '',
        token: val('api_token'),
        notes: val('notes'),
        allowed_roles: getSelectedRoles(),
      };
      if (!payload.name || !payload.base_url) {
        setMsg('名称与 Base URL 为必填。');
        return;
      }
      if (!payload.token) {
        setMsg('API 令牌为必填。');
        return;
      }
      var req;
      if (id) {
        req = api('PUT', '/console/api/instances/' + encodeURIComponent(id), payload);
      } else {
        req = api('POST', '/console/api/instances', payload);
      }
      req.then(function() {
        setMsg(id ? '已更新。' : '已保存。');
        setVal('edit_id','');
        setVal('name','');
        setVal('base_url','');
        setVal('notes','');
        setVal('api_token','');
        var vr = document.getElementById('verifyResult');
        if (vr) vr.textContent = '';
        return load();
      }).catch(function(err) {
        setMsg('失败：' + err.message);
      });
    });

    // ── 清空按钮 ──
    document.getElementById('resetBtn').addEventListener('click', function(e) {
      e.preventDefault();
      setVal('edit_id','');
      setVal('name','');
      setVal('base_url','');
      setVal('notes','');
      setVal('api_token','');
      setSelectedRoles('admin,senior,junior');
      var vr = document.getElementById('verifyResult');
      if (vr) vr.textContent = '';
      setMsg('');
    });

    // ── 编辑 / 删除（事件委托）──
    tbody.addEventListener('click', function(e) {
      var btn = e.target.closest('button');
      if (!btn) return;
      var editId = btn.getAttribute('data-edit');
      var delId = btn.getAttribute('data-del');

      if (editId) {
        api('GET', '/console/api/instances').then(function(data) {
          var items = data ? (data.items || []) : [];
          var it = null;
          for (var i = 0; i < items.length; i++) {
            if (String(items[i].id) === String(editId)) { it = items[i]; break; }
          }
          if (!it) return;
          setVal('edit_id', it.id);
          setVal('name', it.name);
          setVal('base_url', it.base_url);
          setVal('notes', it.notes);
          setVal('api_token', it.token || '');
          setSelectedRoles(it.allowed_roles || '');
          var vr = document.getElementById('verifyResult');
          if (vr) vr.textContent = '';
          setMsg('编辑中：#' + it.id);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }).catch(function(err) {
          setMsg('读取失败：' + err.message);
        });
      }

      if (delId) {
        if (!confirm('确认删除实例 #' + delId + ' ?')) return;
        api('DELETE', '/console/api/instances/' + encodeURIComponent(delId)).then(function() {
          setMsg('已删除。');
          return load();
        }).catch(function(err) {
          setMsg('删除失败：' + err.message);
        });
      }
    });

    // ── 验证按钮 ──
    document.getElementById('verifyBtn').addEventListener('click', function(e) {
      e.preventDefault();
      var baseUrl = val('base_url');
      var token = val('api_token');
      var resultEl = document.getElementById('verifyResult');
      if (!baseUrl) { resultEl.textContent = '请先填写 Base URL'; resultEl.style.color = '#9f1239'; return; }
      if (!token) { resultEl.textContent = '请先填写 API 令牌'; resultEl.style.color = '#9f1239'; return; }
      resultEl.textContent = '验证中...';
      resultEl.style.color = '#64748b';
      api('POST', '/console/api/instances/verify', { base_url: baseUrl, token: token })
        .then(function(data) {
          resultEl.textContent = data && data.message ? data.message : '已完成';
          resultEl.style.color = (data && data.ok) ? '#166534' : '#9f1239';
        })
        .catch(function(err) {
          resultEl.textContent = '✗ ' + err.message;
          resultEl.style.color = '#9f1239';
        });
    });

    // ── 启动 ──
    load().catch(function(err) { setMsg('加载失败：' + err.message); });
  </script>
</body>
</html>
